<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alex Sander Fisio | SPPB Digital</title>
    <!-- Tailwind CSS (CDN para MVP) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Configuração do Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        serif: ['Merriweather', 'serif'],
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0px) rotateY(-5deg) rotateX(5deg)' },
                            '50%': { transform: 'translateY(-20px) rotateY(-2deg) rotateX(2deg)' },
                        }
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .icon { width: 1em; height: 1em; vertical-align: -0.125em; }
    </style>
</head>
<body class="bg-slate-50 antialiased selection:bg-indigo-900 selection:text-white">
    <div id="root"></div>

    <script type="text/babel">
        // Componente de Ícones Corrigido (Renderização Robusta)
        const Icon = ({ name, size = 24, className = "" }) => {
            const elRef = React.useRef(null);
            React.useEffect(() => {
                if (elRef.current) {
                    elRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    lucide.createIcons({
                        root: elRef.current,
                        attrs: { class: className, width: size, height: size }
                    });
                }
            }, [name, size, className]);
            return <span ref={elRef} className="inline-flex items-center justify-center"></span>;
        };

        // PLATAFORMA PRINCIPAL
        function PlataformaIntegradora() {
            const [currentView, setCurrentView] = React.useState('landing'); 
            const [users, setUsers] = React.useState([]); 
            const [currentUser, setCurrentUser] = React.useState(null);
            const [customVideoUrl, setCustomVideoUrl] = React.useState(null);

            const handleLoginSuccess = (user) => {
                setCurrentUser(user);
                if (user.role === 'admin') setCurrentView('admin');
                else setCurrentView('app');
            };

            const handleRegisterUser = (newUser) => {
                setUsers([...users, { ...newUser, id: Date.now(), usageCount: 0 }]);
            };

            const handleUseSystem = () => {
                if (currentUser && currentUser.role !== 'admin') {
                    const updatedUsers = users.map(u => 
                        u.id === currentUser.id ? { ...u, usageCount: u.usageCount + 1 } : u
                    );
                    setUsers(updatedUsers);
                    setCurrentUser({ ...currentUser, usageCount: currentUser.usageCount + 1 });
                }
            };

            return (
                <div className="min-h-screen bg-white font-sans overflow-x-hidden">
                    {currentView === 'landing' && <LandingPage onAccessSystem={() => setCurrentView('login')} customVideoUrl={customVideoUrl} />}
                    {currentView === 'login' && <LoginScreen users={users} onLoginSuccess={handleLoginSuccess} onCancel={() => setCurrentView('landing')} />}
                    {currentView === 'admin' && <AdminDashboard users={users} onRegisterUser={handleRegisterUser} onUpdateVideo={setCustomVideoUrl} onLogout={() => { setCurrentUser(null); setCurrentView('landing'); }} onDemoSystem={() => setCurrentView('app')} />}
                    {currentView === 'app' && <SppbApp currentUser={currentUser} onUseSystem={handleUseSystem} onLogout={() => { currentUser?.role === 'admin' ? setCurrentView('admin') : setCurrentView('landing'); }} />}
                </div>
            );
        }

        // TELA DE LOGIN
        const LoginScreen = ({ users, onLoginSuccess, onCancel }) => {
            const [email, setEmail] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [error, setError] = React.useState('');
            const [isAuthenticating, setIsAuthenticating] = React.useState(false);

            const handleLogin = (e) => {
                e.preventDefault();
                setIsAuthenticating(true);
                setError('');
                
                setTimeout(() => {
                    if (password === 'Thoraika') {
                        onLoginSuccess({ role: 'admin', name: 'Alex Sander' });
                    } else {
                        const user = users.find(u => u.email.toLowerCase() === email.toLowerCase() && u.password === password);
                        if (user) onLoginSuccess({ ...user, role: 'user' });
                        else {
                            setError('Credenciais inválidas. Verifique seu e-mail e senha.');
                            setIsAuthenticating(false);
                        }
                    }
                }, 800);
            };

            return (
                <div className="min-h-screen bg-slate-950 flex items-center justify-center p-6 relative overflow-hidden">
                    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[150%] h-[150%] bg-[radial-gradient(circle_at_center,rgba(79,70,229,0.15)_0%,transparent_50%)] z-0"></div>
                    <div className="w-full max-w-md bg-white/[0.03] backdrop-blur-3xl border border-white/10 rounded-[3rem] p-10 z-10 shadow-2xl">
                        <button onClick={onCancel} className="absolute top-6 right-6 text-slate-500 hover:text-white transition-colors"><Icon name="x" size={24} /></button>
                        <div className="flex flex-col items-center mb-10">
                            <div className="w-20 h-20 bg-indigo-500/10 rounded-3xl flex items-center justify-center mb-6 border border-indigo-400/20 shadow-[0_0_30px_rgba(79,70,229,0.2)]">
                                <Icon name="lock" size={32} className="text-indigo-400" />
                            </div>
                            <h2 className="text-3xl font-black text-white tracking-tighter">Acesso Restrito</h2>
                            <p className="text-indigo-400 text-xs font-black uppercase tracking-[0.4em] mt-2">Alex Sander Fisio</p>
                        </div>
                        <form onSubmit={handleLogin} className="space-y-6">
                            <div className="space-y-4">
                                <div className="relative group">
                                    <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-indigo-400 transition-colors"><Icon name="user" size={20} /></div>
                                    <input type="text" value={email} onChange={(e) => { setEmail(e.target.value); setError(''); }} placeholder="Seu E-mail (Opcional se for Admin)" className="w-full bg-slate-900/50 border-2 border-slate-800 text-white px-12 py-5 rounded-2xl focus:border-indigo-500 outline-none font-medium placeholder:text-slate-600 transition-all" autoFocus />
                                </div>
                                <div className="relative group">
                                    <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-indigo-400 transition-colors"><Icon name="key-round" size={20} /></div>
                                    <input type="password" value={password} onChange={(e) => { setPassword(e.target.value); setError(''); }} placeholder="Sua Senha" className="w-full bg-slate-900/50 border-2 border-slate-800 text-white px-12 py-5 rounded-2xl focus:border-indigo-500 outline-none font-medium placeholder:text-slate-600 transition-all" />
                                </div>
                                {error && <p className="text-rose-500 text-xs font-bold pl-2 flex items-center gap-1"><Icon name="alert-circle" size={14}/> {error}</p>}
                            </div>
                            <button type="submit" disabled={isAuthenticating} className={`w-full py-5 rounded-2xl font-black text-sm uppercase tracking-[0.2em] transition-all flex justify-center items-center gap-2 ${isAuthenticating ? 'bg-indigo-600/50 text-white/50 cursor-not-allowed' : 'bg-indigo-600 text-white hover:bg-indigo-500 shadow-[0_10px_40px_-10px_rgba(79,70,229,0.8)] hover:scale-[1.02] active:scale-95'}`}>
                                {isAuthenticating ? <span className="animate-pulse">Descriptografando...</span> : 'Desbloquear Sistema'}
                            </button>
                        </form>
                        <p className="text-center text-slate-600 text-[9px] font-black uppercase tracking-widest mt-10">Conexão Segura AES-256</p>
                    </div>
                </div>
            );
        };

        // DASHBOARD DO ADMINISTRADOR
        const AdminDashboard = ({ users, onRegisterUser, onUpdateVideo, onLogout, onDemoSystem }) => {
            const [newEmail, setNewEmail] = React.useState('');
            const [newName, setNewName] = React.useState('');
            const [newPassword, setNewPassword] = React.useState('');
            const [maxUsage, setMaxUsage] = React.useState(2);
            const [successMsg, setSuccessMsg] = React.useState('');
            const fileInputRef = React.useRef(null); 

            const handleCreateUser = (e) => {
                e.preventDefault();
                if (!newEmail || !newName || !newPassword) return;
                onRegisterUser({ name: newName, email: newEmail, password: newPassword, maxUsage: parseInt(maxUsage) });
                setNewName(''); setNewEmail(''); setNewPassword(''); 
                setSuccessMsg('Acesso Trial gerado com sucesso!');
                setTimeout(() => setSuccessMsg(''), 3000);
            };

            const handleVideoUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const videoUrl = URL.createObjectURL(file);
                    onUpdateVideo(videoUrl);
                    setSuccessMsg('Vídeo da vitrine atualizado!');
                    setTimeout(() => setSuccessMsg(''), 3000);
                }
            };

            const totalEvaluations = users.reduce((acc, user) => acc + user.usageCount, 0);

            return (
                <div className="min-h-screen bg-slate-50 pb-10">
                    <header className="bg-slate-950 p-6 shadow-xl sticky top-0 z-50 flex justify-between items-center border-b border-indigo-500/20">
                        <div>
                            <h1 className="text-xl font-black text-white tracking-tight leading-none">ALEX SANDER <span className="text-indigo-400">ADMIN</span></h1>
                            <p className="text-[10px] text-indigo-400 font-black uppercase tracking-[0.3em] mt-1">Control Center</p>
                        </div>
                        <div className="flex items-center gap-3">
                            <button onClick={onDemoSystem} className="bg-indigo-600 px-5 py-2.5 rounded-xl text-white font-black text-[10px] uppercase tracking-widest hover:bg-indigo-500 hover:scale-105 active:scale-95 transition-all flex items-center gap-2 shadow-[0_0_20px_rgba(79,70,229,0.4)]">
                                <Icon name="play" size={14} className="fill-current" /> Modo Demo
                            </button>
                            <button onClick={onLogout} className="bg-white/5 border border-white/10 p-2.5 rounded-xl text-white hover:bg-rose-500 hover:border-rose-500 transition-all"><Icon name="log-out" size={18} /></button>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto p-6 mt-6 grid md:grid-cols-5 gap-8">
                        <div className="md:col-span-2 space-y-8">
                            <div className="bg-white p-8 rounded-[2.5rem] shadow-[0_20px_60px_-15px_rgba(0,0,0,0.05)] border border-slate-100">
                                <div className="flex items-center gap-3 mb-8">
                                    <div className="bg-indigo-50 p-3 rounded-2xl text-indigo-600"><Icon name="user-plus" size={24} /></div>
                                    <h2 className="text-xl font-black text-slate-800 tracking-tight">Liberar Acesso</h2>
                                </div>
                                <form onSubmit={handleCreateUser} className="space-y-5">
                                    <div>
                                        <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-2 mb-1 block">Nome do Profissional</label>
                                        <input type="text" value={newName} onChange={e=>setNewName(e.target.value)} className="w-full bg-slate-50 border-2 border-transparent focus:border-indigo-500 p-4 rounded-2xl outline-none font-bold text-slate-800 transition-all" placeholder="Ex: Clínica Movimento" required/>
                                    </div>
                                    <div>
                                        <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-2 mb-1 block">E-mail</label>
                                        <input type="email" value={newEmail} onChange={e=>setNewEmail(e.target.value)} className="w-full bg-slate-50 border-2 border-transparent focus:border-indigo-500 p-4 rounded-2xl outline-none font-bold text-slate-800 transition-all" placeholder="contato@clinica.com" required/>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-2 mb-1 block">Senha</label>
                                            <input type="text" value={newPassword} onChange={e=>setNewPassword(e.target.value)} className="w-full bg-slate-50 border-2 border-transparent focus:border-indigo-500 p-4 rounded-2xl outline-none font-bold text-slate-800 transition-all" placeholder="Ex: 1234" required/>
                                        </div>
                                        <div>
                                            <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-2 mb-1 block">Limite (Usos)</label>
                                            <input type="number" value={maxUsage} onChange={e=>setMaxUsage(e.target.value)} className="w-full bg-indigo-50 border-2 border-transparent focus:border-indigo-500 p-4 rounded-2xl outline-none font-black text-indigo-700 transition-all" min="1" max="100" required/>
                                        </div>
                                    </div>
                                    <button type="submit" className="w-full bg-slate-950 text-white font-black py-5 rounded-2xl shadow-xl hover:bg-indigo-600 active:scale-95 transition-all mt-4 text-xs uppercase tracking-widest">Gerar Credencial</button>
                                    {successMsg && successMsg.includes('Trial') && <p className="text-emerald-500 text-[10px] font-black uppercase tracking-widest text-center mt-4 animate-pulse">{successMsg}</p>}
                                </form>
                            </div>

                            <div className="bg-white p-8 rounded-[2.5rem] shadow-[0_20px_60px_-15px_rgba(0,0,0,0.05)] border border-slate-100">
                                <div className="flex items-center gap-3 mb-6">
                                    <div className="bg-indigo-50 p-3 rounded-2xl text-indigo-600"><Icon name="smartphone" size={24} /></div>
                                    <h2 className="text-xl font-black text-slate-800 tracking-tight">Vitrine Comercial</h2>
                                </div>
                                <p className="text-[10px] text-slate-500 mb-6 font-bold uppercase tracking-widest">Personalizar Vídeo de Fundo (MP4)</p>
                                
                                <input type="file" accept="video/mp4,video/mov,video/quicktime" className="hidden" ref={fileInputRef} onChange={handleVideoUpload} />
                                <button onClick={() => fileInputRef.current.click()} className="w-full bg-slate-50 text-indigo-600 border-2 border-dashed border-indigo-200 font-black py-5 rounded-2xl hover:bg-indigo-50 hover:border-indigo-400 active:scale-95 transition-all text-xs uppercase tracking-widest flex items-center justify-center gap-2">
                                    <Icon name="sparkles" size={16} /> Carregar Novo Vídeo
                                </button>
                                {successMsg && successMsg.includes('Vídeo') && <p className="text-emerald-500 text-[10px] font-black uppercase tracking-widest text-center mt-4 animate-pulse">{successMsg}</p>}
                            </div>
                        </div>

                        <div className="md:col-span-3 space-y-8">
                            <div className="grid grid-cols-2 gap-6">
                                <div className="bg-slate-950 p-8 rounded-[2.5rem] text-white shadow-2xl relative overflow-hidden">
                                    <div className="absolute -right-6 -top-6 text-white/5"><Icon name="users" size={120} /></div>
                                    <p className="text-[10px] font-black uppercase tracking-[0.3em] text-indigo-400 mb-2 relative z-10">Leads Ativos</p>
                                    <div className="text-6xl font-black tracking-tighter relative z-10">{users.length}</div>
                                </div>
                                <div className="bg-indigo-600 p-8 rounded-[2.5rem] text-white shadow-2xl shadow-indigo-500/30 relative overflow-hidden">
                                    <div className="absolute -right-6 -top-6 text-white/10"><Icon name="activity" size={120} /></div>
                                    <p className="text-[10px] font-black uppercase tracking-[0.3em] text-indigo-200 mb-2 relative z-10">Laudos Gerados</p>
                                    <div className="text-6xl font-black tracking-tighter relative z-10">{totalEvaluations}</div>
                                </div>
                            </div>
                            <div className="bg-white p-8 rounded-[2.5rem] shadow-[0_20px_60px_-15px_rgba(0,0,0,0.05)] border border-slate-100 min-h-[300px] flex flex-col">
                                <h3 className="text-xs font-black text-slate-400 uppercase tracking-[0.2em] mb-6">Controle de Acessos Liberados</h3>
                                {users.length === 0 ? (
                                    <div className="flex flex-col items-center justify-center h-full opacity-30 my-auto">
                                        <div className="mb-4"><Icon name="shield-check" size={48} /></div>
                                        <p className="text-sm font-black uppercase tracking-widest text-center">Nenhum Lead Registrado</p>
                                    </div>
                                ) : (
                                    <div className="space-y-4 overflow-y-auto pr-2 flex-grow">
                                        {users.map((u, i) => (
                                            <div key={i} className="flex justify-between items-center p-5 bg-slate-50 hover:bg-slate-100 transition-colors rounded-2xl border border-slate-100">
                                                <div>
                                                    <p className="font-black text-slate-800 text-base">{u.name}</p>
                                                    <p className="text-xs font-bold text-slate-500 mt-1">{u.email}</p>
                                                    <p className="text-[10px] font-black text-indigo-500 uppercase mt-2 tracking-widest bg-indigo-100 inline-block px-2 py-1 rounded-md">Senha: {u.password}</p>
                                                </div>
                                                <div className="text-right bg-white p-3 rounded-xl border border-slate-100 shadow-sm min-w-[80px]">
                                                    <span className={`text-2xl font-black ${u.usageCount >= u.maxUsage ? 'text-rose-500' : 'text-emerald-500'}`}>{u.usageCount}</span>
                                                    <span className="text-xs text-slate-400 font-bold">/{u.maxUsage}</span>
                                                    <p className="text-[8px] font-black uppercase text-slate-400 tracking-widest mt-1">Testes</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        // LANDING PAGE DE VENDAS
        const LandingPage = ({ onAccessSystem, customVideoUrl }) => {
            const [isMenuOpen, setIsMenuOpen] = React.useState(false);
            const [billingCycle, setBillingCycle] = React.useState('mensal');
            const [isScrolled, setIsScrolled] = React.useState(false);
            const [isMuted, setIsMuted] = React.useState(true);
            const videoRef = React.useRef(null);

            React.useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const videoSrc = customVideoUrl || "https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4";

            return (
                <div className="bg-slate-50">
                    <nav className={`fixed top-0 w-full z-50 transition-all duration-500 ${isScrolled ? 'bg-white/80 backdrop-blur-2xl border-b border-slate-200/50 py-3 shadow-sm' : 'bg-transparent py-5'}`}>
                        <div className="max-w-7xl mx-auto px-6 flex items-center justify-between">
                            <div className="flex flex-col items-center">
                                <span className="text-2xl font-black text-slate-950 tracking-tighter leading-none">ALEX SANDER <span className="text-indigo-600">FISIO</span></span>
                                <span className="text-[9px] font-black text-indigo-500 uppercase tracking-[0.4em] mt-1">Tecnologia Clínica</span>
                            </div>
                            <div className="hidden md:flex items-center gap-10">
                                <a href="#solucao" className="text-[11px] font-black uppercase tracking-[0.2em] text-slate-500 hover:text-indigo-600 transition-colors">A Solução</a>
                                <a href="#planos" className="text-[11px] font-black uppercase tracking-[0.2em] text-slate-500 hover:text-indigo-600 transition-colors">Assinaturas</a>
                                <button onClick={onAccessSystem} className="bg-slate-950 text-white px-8 py-3.5 rounded-full font-black text-xs uppercase tracking-widest hover:bg-indigo-600 hover:shadow-[0_0_30px_rgba(79,70,229,0.3)] transition-all">Acesso Restrito</button>
                            </div>
                            <button className="md:hidden text-slate-950" onClick={() => setIsMenuOpen(!isMenuOpen)}><Icon name={isMenuOpen ? "x" : "menu"} size={28} /></button>
                        </div>
                    </nav>

                    <section className="relative pt-40 pb-20 px-6 min-h-[90vh] flex items-center overflow-hidden">
                        <div className="absolute top-0 right-0 w-full h-full overflow-hidden z-0 pointer-events-none">
                            <div className="absolute -top-[20%] -right-[10%] w-[70%] h-[70%] rounded-full bg-[radial-gradient(circle,rgba(79,70,229,0.08)_0%,transparent_70%)] blur-3xl"></div>
                            <div className="absolute top-[40%] -left-[10%] w-[50%] h-[50%] rounded-full bg-[radial-gradient(circle,rgba(56,189,248,0.05)_0%,transparent_70%)] blur-3xl"></div>
                        </div>

                        <div className="max-w-7xl mx-auto grid lg:grid-cols-2 gap-16 items-center relative z-10">
                            <div className="animate-in fade-in slide-in-from-bottom-10 duration-1000">
                                <div className="inline-flex items-center gap-2 bg-indigo-50/80 backdrop-blur-sm border border-indigo-100 text-indigo-700 px-5 py-2.5 rounded-full text-[10px] font-black uppercase tracking-[0.25em] mb-8 shadow-sm">
                                    <Icon name="sparkles" size={14} className="text-indigo-500" /> Padrão Ouro em Gerontologia
                                </div>
                                <h1 className="text-6xl sm:text-7xl md:text-[5.5rem] font-black text-slate-950 leading-[0.95] mb-8 tracking-tighter">
                                    Mãos no paciente.<br/>
                                    <span className="text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-sky-500 font-serif italic font-light">Nunca na prancheta.</span>
                                </h1>
                                <p className="text-lg sm:text-xl text-slate-500 mb-12 leading-relaxed font-medium max-w-xl">
                                    Elimine o risco oculto da distração analógica. O <b>Alex Sander Fisio SPPB</b> digitaliza a avaliação funcional com precisão absoluta e foco 100% na prevenção de quedas.
                                </p>
                                <div className="flex flex-col sm:flex-row gap-5">
                                    <button onClick={() => document.getElementById('planos').scrollIntoView({ behavior: 'smooth' })} className="bg-slate-950 text-white px-10 py-5 rounded-full font-black text-xs uppercase tracking-[0.2em] shadow-[0_20px_40px_-10px_rgba(0,0,0,0.3)] hover:scale-105 hover:bg-indigo-600 transition-all flex items-center justify-center gap-3">
                                        Assinar Agora <Icon name="move-right" size={18} />
                                    </button>
                                    <button onClick={onAccessSystem} className="bg-white border border-slate-200 text-slate-800 px-10 py-5 rounded-full font-black text-xs uppercase tracking-[0.2em] shadow-sm hover:border-slate-300 hover:bg-slate-50 transition-all flex items-center justify-center gap-2">
                                        <Icon name="lock" size={14}/> Login Clínica
                                    </button>
                                </div>
                            </div>
                            
                            <div className="relative flex justify-center mt-12 lg:mt-0 perspective-1000">
                                <div className="relative z-10 bg-slate-950 p-3 rounded-[3.5rem] shadow-[0_40px_80px_-20px_rgba(79,70,229,0.3)] border-b-8 border-r-8 border-slate-900 border-t-2 border-l-2 border-slate-700 w-full max-w-[320px] animate-float transform rotate-y-[-5deg] rotate-x-[5deg]">

            );
        };

        // APLICATIVO CLÍNICO (SPPB)
        const SppbApp = ({ currentUser, onUseSystem, onLogout }) => {
            const [step, setStep] = React.useState('intro');
            const [patient, setPatient] = React.useState({ name: '', age: '', whatsapp: '' });
            const [balanceScores, setBalanceScores] = React.useState({ feetTogether: 0, semiTandem: 0, tandem: 0 });
            const [gaitData, setGaitData] = React.useState({ distance: 4, time: null });
            const [chairStandData, setChairStandData] = React.useState({ fiveTimesTime: null });
            const [timerActive, setTimerActive] = React.useState(false);
            const [seconds, setSeconds] = React.useState(0);
            const [copyFeedback, setCopyFeedback] = React.useState(false);
            const timerRef = React.useRef(null);

            const startTimer = () => {
                setSeconds(0); setTimerActive(true);
                timerRef.current = setInterval(() => { setSeconds(prev => prev + 0.01); }, 10);
            };

            const stopTimer = () => {
                clearInterval(timerRef.current); setTimerActive(false);
                return parseFloat(seconds.toFixed(2));
            };

            const calculateGaitScore = (t, d) => { if(!t) return 0; if(d===4){ return t<4.82 ? 4 : t<=6.2 ? 3 : t<=8.7 ? 2 : 1; } return t<3.62 ? 4 : t<=4.65 ? 3 : t<=6.52 ? 2 : 1; };
            const calculateChairScore = (t) => { if(!t || t>60) return 0; return t<=11.19 ? 4 : t<=13.69 ? 3 : t<=16.69 ? 2 : 1; };

            const balanceTotal = balanceScores.feetTogether + balanceScores.semiTandem + balanceScores.tandem;
            const gaitScore = calculateGaitScore(gaitData.time, gaitData.distance);
            const chairScore = calculateChairScore(chairStandData.fiveTimesTime);
            const totalScore = balanceTotal + gaitScore + chairScore;

            const getInterpretation = (score) => {
                if (score <= 3) return "Limitação Muito Grave (Alto risco de quedas)";
                if (score <= 6) return "Limitação Grave (Baixo desempenho físico)";
                if (score <= 9) return "Limitação Moderada (Indicação de intervenção)";
                return "Limitação Mínima/Ausente (Bom desempenho)";
            };

            const generateReport = () => {
                const avaliadorName = currentUser?.role === 'user' ? currentUser.name : "Alex Sander";
                return `*RELATÓRIO DE PERFORMANCE FUNCIONAL (SPPB)*\n--------------------------------------------\nData: ${new Date().toLocaleDateString('pt-BR')}\nPaciente: ${patient.name || "Não informado"}\nIdade: ${patient.age ? patient.age + " anos" : "Não informada"}\nAvaliador: ${avaliadorName}\n\n*RESULTADOS POR TESTE:*\n- Equilíbrio Estático: ${balanceTotal}/4\n- Velocidade de Marcha (${gaitData.distance}m): ${gaitScore}/4\n- Força de MMII (Cadeira): ${chairScore}/4\n\n*ESCORE TOTAL SPPB: ${totalScore}/12*\n\n*PARECER CLÍNICO:*\n${getInterpretation(totalScore)}\n\n_Relatório gerado via Alex Sander Fisio SPPB Digital_`;
            };

            const sendWhatsApp = () => {
                const text = encodeURIComponent(generateReport());
                let num = patient.whatsapp.replace(/\D/g, '');
                if(num.length === 10 || num.length === 11) num = '55' + num;
                window.open(num ? `https://wa.me/${num}?text=${text}` : `https://wa.me/?text=${text}`, '_blank');
            };

            const copyToClipboard = () => {
                const text = generateReport();
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    setCopyFeedback(true);
                    setTimeout(() => setCopyFeedback(false), 2000);
                } catch (err) { console.error('Erro ao copiar', err); }
                document.body.removeChild(textArea);
            };

            const ProgressBar = ({ current }) => {
                const steps = ['Bio', 'Equilíbrio', 'Marcha', 'Cadeira', 'Relatório'];
                return (
                    <div className="flex w-full px-4 mb-6">
                        {steps.map((s, idx) => (
                            <div key={idx} className="flex-1 flex flex-col items-center">
                                <div className={`h-1 w-full rounded ${idx <= current ? 'bg-indigo-600' : 'bg-gray-200'}`} />
                                <span className={`text-[9px] mt-1 font-bold ${idx <= current ? 'text-indigo-600' : 'text-gray-400'}`}>{s}</span>
                            </div>
                        ))}
                    </div>
                );
            };

            const FinalMetric = ({ label, val, max }) => (
                <div className="bg-white p-4 rounded-[1.5rem] border border-slate-100 text-center shadow-sm">
                    <p className="text-[8px] font-black text-slate-400 uppercase mb-2 tracking-tighter">{label}</p>
                    <div className="flex items-baseline justify-center gap-0.5">
                        <span className="text-xl font-black text-slate-800">{val}</span>
                        <span className="text-[10px] font-black text-slate-300">/{max}</span>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-50 text-slate-900 pb-10">
                    <header className="bg-white p-5 shadow-sm sticky top-0 z-50 flex justify-between items-center border-b border-slate-100">
                        <div className="flex flex-col">
                            <h1 className="text-lg font-black text-slate-800 tracking-tight leading-none">{currentUser?.role === 'user' ? currentUser.name.toUpperCase() : 'ALEX SANDER'} <span className="text-indigo-600">FISIO</span></h1>
                            <p className="text-[10px] text-indigo-500 font-bold uppercase tracking-widest mt-1 opacity-90">{currentUser?.role === 'user' ? `Trial (${currentUser.usageCount}/${currentUser.maxUsage})` : 'Premium'}</p>
                        </div>
                        <div className="flex items-center gap-3">
                            <div className="bg-indigo-100 px-3 py-1.5 rounded-xl border border-indigo-200 hidden sm:block"><span className="text-sm font-black text-indigo-700">{totalScore}/12</span></div>
                            <button onClick={onLogout} className="bg-slate-100 p-2.5 rounded-xl text-slate-500 hover:bg-rose-100 hover:text-rose-600"><Icon name="log-out" size={18} /></button>
                        </div>
                    </header>

                    <main className="max-w-md mx-auto p-4 mt-4">
                        {step === 'intro' && (
                            <div className="animate-in fade-in">
                                {currentUser?.role === 'user' && currentUser.usageCount >= currentUser.maxUsage ? (
                                    <div className="bg-white p-8 rounded-[2.5rem] shadow-xl border border-rose-100 text-center">
                                        <div className="w-20 h-20 bg-rose-50 rounded-full flex items-center justify-center mx-auto mb-6"><Icon name="lock" size={32} className="text-rose-500" /></div>
                                        <h2 className="text-2xl font-black mb-3">Teste Encerrado</h2>
                                        <p className="text-sm text-slate-500 mb-8">Limite de avaliações atingido. Assine o plano Especialista.</p>
                                        <button onClick={onLogout} className="w-full bg-slate-950 text-white font-black py-4 rounded-2xl">Ver Planos</button>
                                    </div>
                                ) : (
                                    <div className="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100">
                                        <div className="w-16 h-16 bg-indigo-50 rounded-2xl flex items-center justify-center mb-6"><Icon name="user-check" size={32} className="text-indigo-600" /></div>
                                        <h2 className="text-2xl font-bold mb-6">Novo Atendimento</h2>
                                        <div className="space-y-4 mb-8">
                                            <input type="text" value={patient.name} onChange={(e) => setPatient({...patient, name: e.target.value})} className="w-full bg-slate-50 border-2 border-transparent focus:border-indigo-500 p-4 rounded-xl font-semibold" placeholder="Nome do Paciente" />
                                            <input type="number" value={patient.age} onChange={(e) => setPatient({...patient, age: e.target.value})} className="w-full bg-slate-50 border-2 border-transparent focus:border-indigo-500 p-4 rounded-xl font-semibold" placeholder="Idade" />
                                            <div className="relative">
                                                <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"><Icon name="message-circle" size={20} /></div>
                                                <input type="tel" value={patient.whatsapp} onChange={(e) => setPatient({...patient, whatsapp: e.target.value})} className="w-full bg-slate-50 border-2 border-transparent focus:border-indigo-500 py-4 pr-4 pl-12 rounded-xl font-semibold" placeholder="WhatsApp Familiar" />
                                            </div>
                                        </div>
                                        <button onClick={() => setStep('balance_1')} className="w-full bg-indigo-600 text-white font-black py-5 rounded-2xl shadow-xl flex justify-center items-center gap-2">INICIAR TESTES <Icon name="chevron-right" size={20} /></button>
                                    </div>
                                )}
                            </div>
                        )}

                        {step.startsWith('balance') && (
                            <div className="animate-in fade-in">
                                <ProgressBar current={1} />
                                <div className="bg-white p-6 rounded-[2rem] shadow-xl">
                                    <div className="flex justify-between items-center mb-6">
                                        <h2 className="text-lg font-black uppercase">1. Equilíbrio</h2>
                                        <div className="bg-slate-100 px-3 py-1 rounded-full text-[10px] font-black text-slate-500 uppercase">{step === 'balance_1' ? 'Pés Juntos' : step === 'balance_2' ? 'Semi-Tandem' : 'Tandem'}</div>
                                    </div>
                                    <div className="bg-indigo-50 p-5 rounded-2xl mb-8 border-l-4 border-indigo-500 text-sm text-indigo-900 font-medium">
                                        {step === 'balance_1' && "Fique em pé por 10 segundos com os pés juntos."}
                                        {step === 'balance_2' && "Calcanhar de um pé ao lado do dedão do outro."}
                                        {step === 'balance_3' && "Um pé totalmente à frente do outro."}
                                    </div>
                                    <div className="text-center mb-10"><div className="text-7xl font-mono font-black">{seconds.toFixed(2)}</div></div>
                                    <div className="space-y-4">
                                        {!timerActive ? 
                                            <button onClick={startTimer} className="w-full bg-emerald-500 text-white font-black py-5 rounded-2xl flex justify-center items-center gap-3 text-xl shadow-lg"><Icon name="play" size={24} /> INICIAR</button> : 
                                            <button onClick={() => {
                                                const t = stopTimer();
                                                if (step === 'balance_1') setBalanceScores({...balanceScores, feetTogether: t >= 10 ? 1 : 0});
                                                if (step === 'balance_2') setBalanceScores({...balanceScores, semiTandem: t >= 10 ? 1 : 0});
                                                if (step === 'balance_3') setBalanceScores({...balanceScores, tandem: t >= 10 ? 2 : (t >= 3 ? 1 : 0)});
                                            }} className="w-full bg-rose-500 text-white font-black py-5 rounded-2xl flex justify-center items-center gap-3 text-xl shadow-lg animate-pulse"><Icon name="square" size={24} /> PARAR</button>
                                        }
                                        <div className="flex gap-3 pt-2">
                                            <button onClick={() => setStep(step === 'balance_1' ? 'intro' : step === 'balance_2' ? 'balance_1' : 'balance_2')} className="flex-1 bg-slate-100 text-slate-400 py-4 rounded-2xl font-black text-xs uppercase">Voltar</button>
                                            <button onClick={() => setStep(step === 'balance_1' ? 'balance_2' : step === 'balance_2' ? 'balance_3' : 'gait')} className="flex-[2] bg-indigo-600 text-white py-4 rounded-2xl font-black flex justify-center items-center gap-2 text-xs uppercase shadow-lg">Próximo <Icon name="chevron-right" size={18}/></button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {step === 'gait' && (
                            <div className="animate-in fade-in">
                                <ProgressBar current={2} />
                                <div className="bg-white p-6 rounded-[2rem] shadow-xl">
                                    <h2 className="text-lg font-black uppercase mb-6">2. Velocidade de Marcha</h2>
                                    <div className="flex bg-slate-100 p-1.5 rounded-2xl mb-8">
                                        <button onClick={() => setGaitData({...gaitData, distance: 3})} className={`flex-1 py-3 rounded-xl text-xs font-black transition-all ${gaitData.distance === 3 ? 'bg-white shadow text-indigo-600' : 'text-gray-400'}`}>3 METROS</button>
                                        <button onClick={() => setGaitData({...gaitData, distance: 4})} className={`flex-1 py-3 rounded-xl text-xs font-black transition-all ${gaitData.distance === 4 ? 'bg-white shadow text-indigo-600' : 'text-gray-400'}`}>4 METROS</button>
                                    </div>
                                    <div className="text-center mb-10"><div className="text-7xl font-mono font-black">{seconds.toFixed(2)}</div></div>
                                    <div className="space-y-4">
                                        {!timerActive ? 
                                            <button onClick={startTimer} className="w-full bg-emerald-500 text-white font-black py-5 rounded-2xl flex justify-center items-center gap-3 text-xl shadow-lg"><Icon name="play" size={24} /> INICIAR MARCHA</button> : 
                                            <button onClick={() => setGaitData({...gaitData, time: stopTimer()})} className="w-full bg-rose-500 text-white font-black py-5 rounded-2xl flex justify-center items-center gap-3 text-xl shadow-lg animate-pulse"><Icon name="square" size={24} /> PARAR (CHEGADA)</button>
                                        }
                                        <button onClick={() => setStep('chair_stand')} className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black">Próximo</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {step === 'chair_stand' && (
                            <div className="animate-in fade-in">
                                <ProgressBar current={3} />
                                <div className="bg-white p-6 rounded-[2rem] shadow-xl">
                                    <h2 className="text-lg font-black uppercase mb-4">3. Cadeira (5x)</h2>
                                    <div className="text-center mb-10"><div className="text-7xl font-mono font-black">{seconds.toFixed(2)}</div></div>
                                    <div className="space-y-4">
                                        {!timerActive ? 
                                            <button onClick={startTimer} className="w-full bg-emerald-500 text-white font-black py-5 rounded-2xl flex justify-center items-center gap-3 text-xl shadow-lg"><Icon name="play" size={24} /> INICIAR</button> : 
                                            <button onClick={() => setChairStandData({fiveTimesTime: stopTimer()})} className="w-full bg-rose-500 text-white font-black py-5 rounded-2xl flex justify-center items-center gap-3 text-xl shadow-lg animate-pulse"><Icon name="square" size={24} /> PARAR</button>
                                        }
                                        <button onClick={() => { setStep('summary'); onUseSystem(); }} className="w-full bg-slate-950 text-white py-4 rounded-2xl font-black">GERAR LAUDO</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {step === 'summary' && (
                            <div className="animate-in fade-in">
                                <div className="bg-white p-8 rounded-[3rem] shadow-2xl">
                                    <div className="text-center mb-8">
                                        <div className="text-6xl font-black text-indigo-600 mb-2">{totalScore}/12</div>
                                        <p className="font-bold text-slate-500 uppercase tracking-widest">{getInterpretation(totalScore)}</p>
                                    </div>
                                    <button onClick={sendWhatsApp} className="w-full bg-emerald-500 text-white font-black py-5 rounded-2xl flex justify-center items-center gap-2 mb-4 shadow-lg hover:bg-emerald-600"><Icon name="message-circle" size={20} /> Enviar para WhatsApp</button>
                                    <button onClick={() => { setStep('intro'); setPatient({name:'', age:'', whatsapp:''}); }} className="w-full bg-slate-100 text-slate-500 font-black py-4 rounded-2xl uppercase text-xs">Novo Atendimento</button>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PlataformaIntegradora />);
    </script>
</body>
</html>
